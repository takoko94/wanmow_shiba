<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>9位 柴犬</title>

<style>

@font-face{
    font-family:'Panda';
    src:url('pandabakery.ttf');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#ead1a3;

    overflow:hidden;
}

/* =========================
   1280×720
========================= */

.stage{
    position:relative;

    width:1280px;
    height:720px;

    overflow:hidden;

    border-radius:24px;

    background:
    url('haikei.png')
    center center / cover no-repeat;

    box-shadow:
    0 25px 60px rgba(0,0,0,0.18);
}

/* 背景ふんわり */

.stage::before{
    content:'';

    position:absolute;
    inset:0;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(1px);

    z-index:0;
}

/* =========================
   推し犬総選挙ロゴ
========================= */

.event-logo{
    position:absolute;

    top:22px;
    right:22px;

    width:290px;

    z-index:5;

    filter:
    drop-shadow(0 8px 18px rgba(0,0,0,0.15));

    animation:
    fadeUp 1s ease;
}

/* =========================
   真ん中
========================= */

.center{
    position:absolute;

    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:3;

    transform:translateY(-55px);
}

/* =========================
   順位
========================= */

.rank{
    font-family:'Panda';

    font-size:78px;

    line-height:1;

    color:#ff8fb0;

    text-shadow:
    0 5px 0 #fff,
    0 10px 20px rgba(255,143,176,0.35);

    animation:
    fadeUp 1s ease;
}

/* =========================
   犬種名
========================= */

.name{
    margin-top:10px;

    font-family:'Panda';

    font-size:120px;

    line-height:1;

    letter-spacing:4px;

    color:#7b4b35;

    text-shadow:
    0 6px 0 #fff,
    0 12px 25px rgba(0,0,0,0.12);

    animation:
    fadeUp 1.2s ease;
}

/* =========================
   写真
========================= */

.photo{
    position:absolute;

    width:320px;
    height:400px;

    object-fit:cover;

    background:#fff;

    padding:12px 12px 50px;

    border-radius:10px;

    box-shadow:
    0 15px 35px rgba(0,0,0,0.15);

    z-index:2;
}

/* 左 */

.left{
    left:60px;
    top:180px;

    transform:
    rotate(-5deg);

    animation:
    floatLeft 4s ease-in-out infinite;
}

/* 右 */

.right{
    right:60px;
    top:180px;

    transform:
    rotate(5deg);

    animation:
    floatRight 4s ease-in-out infinite;

    animation-delay:2s;
}

/* テープ */

.tape{
    position:absolute;

    width:90px;
    height:24px;

    background:
    repeating-linear-gradient(
        45deg,
        #ffbfd0,
        #ffbfd0 8px,
        #ffcddd 8px,
        #ffcddd 16px
    );

    opacity:0.85;

    border-radius:4px;

    z-index:4;
}

.tape-left{
    left:155px;
    top:190px;

    transform:
    rotate(-8deg);
}

.tape-right{
    right:155px;
    top:190px;

    transform:
    rotate(8deg);
}

/* =========================
   投票数
========================= */

.vote-box{
    position:absolute;

    left:50%;
    bottom:95px;

    transform:
    translateX(-50%)
    scale(0.82);

    display:flex;
    align-items:center;
    gap:16px;

    padding:
    18px 34px;

    background:
    rgba(255,245,240,0.95);

    border:
    6px solid #ffc7d5;

    border-radius:26px;

    box-shadow:
    0 10px 25px rgba(255,170,190,0.18);

    z-index:4;
}

/* 投票数 */

.vote-text{
    font-family:'Panda';

    font-size:40px;

    color:#7b4b35;
}

/* 数字 */

.vote-number{
    font-family:'Panda';

    font-size:72px;

    line-height:1;

    color:#ff9fba;

    text-shadow:
    0 4px 0 #fff,
    0 8px 14px rgba(255,159,186,0.25);
}

/* 票 */

.vote-unit{
    font-family:'Panda';

    font-size:52px;

    color:#7b4b35;
}

/* =========================
   キラキラ
========================= */

.sparkle{
    position:absolute;

    z-index:1;

    opacity:0.8;

    animation:
    sparkle 3s infinite ease-in-out;
}

/* 星 */

.star{
    width:18px;
    height:18px;

    background:#ffe27c;

    clip-path:polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
    );
}

/* 肉球 */

.paw{
    width:22px;
    height:22px;

    border-radius:50%;

    background:#ffd3dc;
}

/* 配置 */

.s1{
    top:80px;
    left:120px;
}

.s2{
    top:140px;
    left:350px;

    animation-delay:1s;
}

.s3{
    top:120px;
    right:360px;

    animation-delay:2s;
}

.s4{
    bottom:90px;
    left:220px;

    animation-delay:1.5s;
}

.s5{
    bottom:120px;
    right:260px;

    animation-delay:2.5s;
}

.s6{
    top:300px;
    left:520px;

    animation-delay:0.7s;
}

.s7{
    top:310px;
    right:520px;

    animation-delay:1.8s;
}

/* =========================
   アニメーション
========================= */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:
        translateY(20px);
    }

    to{
        opacity:1;
        transform:
        translateY(0);
    }
}

@keyframes sparkle{
    0%{
        transform:
        scale(0.8);

        opacity:0.3;
    }

    50%{
        transform:
        scale(1.3);

        opacity:1;
    }

    100%{
        transform:
        scale(0.8);

        opacity:0.3;
    }
}

@keyframes floatLeft{
    0%{
        transform:
        rotate(-5deg)
        translateY(0px);
    }

    50%{
        transform:
        rotate(-5deg)
        translateY(-10px);
    }

    100%{
        transform:
        rotate(-5deg)
        translateY(0px);
    }
}

@keyframes floatRight{
    0%{
        transform:
        rotate(5deg)
        translateY(0px);
    }

    50%{
        transform:
        rotate(5deg)
        translateY(-10px);
    }

    100%{
        transform:
        rotate(5deg)
        translateY(0px);
    }
}

</style>
</head>

<body>

<div class="stage">

<!-- キラキラ -->

<div class="sparkle star s1"></div>
<div class="sparkle star s2"></div>
<div class="sparkle star s3"></div>

<div class="sparkle paw s4"></div>
<div class="sparkle paw s5"></div>
<div class="sparkle paw s6"></div>
<div class="sparkle paw s7"></div>

<!-- ロゴ -->

<img
src="wan_logo.png"
class="event-logo"
>

<!-- テープ -->

<div class="tape tape-left"></div>
<div class="tape tape-right"></div>

<!-- 写真 -->

<img
src="shiba1.png"
class="photo left"
>

<img
src="shiba2.png"
class="photo right"
>

<!-- 真ん中 -->

<div class="center">

<div class="rank">
9位
</div>

<div class="name">
柴犬
</div>

</div>

<!-- 投票数 -->

<div class="vote-box">

<div class="vote-text">
投票数
</div>

<div class="vote-number">
143
</div>

<div class="vote-unit">
票
</div>

</div>

</div>

</body>
</html>
